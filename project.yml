name: MoneroOceanSteam

options:
  bundleIdPrefix: com.deadbyte
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: 1
    SUPPORTS_MACCATALYST: false

packages: {}

targets:
  MoneroOceanSteam:
    type: application
    platform: iOS
    sources:
      - path: ios/MoneroOceanSteam
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deadbyte.monerooceansteam
        PRODUCT_NAME: MoneroOcean Steam
        INFOPLIST_FILE: ios/MoneroOceanSteam/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: ios/MoneroOceanSteam/Preview Content
        CODE_SIGN_STYLE: Automatic
    info:
      path: ios/MoneroOceanSteam/Info.plist
      properties:
        CFBundleDisplayName: MoneroOcean Steam
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
